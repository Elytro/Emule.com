<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Upload</title>
  <link href="https://apps.bdimg.com/libs/bootstrap/3.3.4/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://apps.bdimg.com/libs/fontawesome/4.4.0/css/font-awesome.min.css" rel="stylesheet">
  <style>
    body {
      background: #f5f5f5;
      font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .upload-wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 40px 15px;
    }
    .upload-wrap .page-header {
      margin-top: 0;
      padding-bottom: 12px;
    }
    .upload-wrap .page-header h2 {
      font-size: 22px;
      font-weight: 500;
    }
    .upload-wrap .page-header small {
      font-size: 13px;
      color: #999;
    }

    .panel {
      border-radius: 6px;
      border-color: #e0e0e0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .panel-body { padding: 24px 28px; }

    /* 仓库下拉 */
    .repo-wrapper { position: relative; }
    .repo-dropdown {
      position: absolute;
      top: 100%; left: 0; right: 0;
      background: #fff;
      border: 1px solid #ccc;
      border-top: none;
      border-radius: 0 0 4px 4px;
      max-height: 240px;
      overflow-y: auto;
      z-index: 1050;
      display: none;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    }
    .repo-dropdown.open { display: block; }
    .repo-dd-item {
      padding: 10px 16px;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.12s;
    }
    .repo-dd-item:last-child { border-bottom: none; }
    .repo-dd-item:hover, .repo-dd-item.active { background: #f5f5f5; }
    .repo-dd-item .repo-fullname { font-weight: 600; color: #333; }
    .repo-dd-item .repo-private { color: #a0a0a0; font-size: 11px; margin-left: 4px; }
    .repo-dd-item .repo-desc {
      color: #aaa; font-size: 12px;
      display: block; margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* 拖拽区 */
    .dropzone {
      border: 2px dashed #ddd;
      border-radius: 8px;
      padding: 34px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
      background: #fafafa;
    }
    .dropzone:hover { border-color: #b0b0b0; background: #f2f2f2; }
    .dropzone.drag-over { border-color: #337ab7; background: #edf4fa; }
    .dropzone.has-file { border-color: #5cb85c; border-style: solid; background: #f6fdf6; }
    .dropzone .dz-icon { font-size: 38px; color: #c0c0c0; margin-bottom: 8px; transition: color 0.25s; }
    .dropzone:hover .dz-icon, .dropzone.drag-over .dz-icon { color: #337ab7; }
    .dropzone.has-file .dz-icon { color: #5cb85c; }
    .dropzone .dz-main { font-size: 14px; color: #888; }
    .dropzone .dz-main strong { color: #337ab7; font-weight: 600; }
    .dropzone .dz-hint { font-size: 12px; color: #c0c0c0; margin-top: 4px; }

    /* 文件信息卡片 */
    .file-info-card {
      display: none;
      margin-top: 12px;
      padding: 12px 16px;
      background: #f9f9f9;
      border: 1px solid #e5e5e5;
      border-radius: 4px;
      align-items: center;
    }
    .file-info-card.show { display: flex; }
    .file-info-card .fic-icon {
      width: 38px; height: 38px;
      line-height: 38px; text-align: center;
      background: #eee; border-radius: 4px;
      font-size: 17px; flex-shrink: 0; margin-right: 12px;
    }
    .file-info-card .fic-detail { flex: 1; min-width: 0; }
    .file-info-card .fic-name {
      font-size: 13px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-info-card .fic-size { font-size: 11px; color: #aaa; margin-top: 2px; }
    .file-info-card .fic-remove {
      color: #bbb; cursor: pointer; flex-shrink: 0;
      font-size: 18px; padding: 4px 6px;
      background: none; border: none;
      transition: color 0.15s;
    }
    .file-info-card .fic-remove:hover { color: #d9534f; }

    /* 提交按钮 */
    .btn-upload {
      width: 100%;
      padding: 11px 20px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 1px;
      border-radius: 4px;
      margin-top: 6px;
      transition: all 0.2s;
    }
    .btn-upload .fa-spinner { display: none; margin-left: 6px; }

    /* 提示信息 */
    .alert-msg { display: none; margin-top: 16px; margin-bottom: 0; }

    /* label 优化 */
    .control-label { font-weight: 500 !important; color: #555 !important; }
    .control-label .text-light { font-weight: 400; color: #bbb; font-size: 12px; }

    /* form-group 间距 */
    .form-group-sm { margin-bottom: 16px; }

    hr.soft { border-top-color: #f0f0f0; margin: 12px 0 18px; }

    @media (max-width: 480px) {
      .panel-body { padding: 18px 16px; }
      .repo-dd-item .repo-desc { display: none; }
    }
  </style>
</head>
<body>

<div class="upload-wrap">
  <div class="page-header">
    <h2><i class="fa fa-github"></i> GitHub Upload</h2>
    <small>通过 API 上传文件到仓库 · 已存在文件自动覆盖</small>
  </div>

  <div class="panel panel-default">
    <div class="panel-body">
      <!-- 仓库 -->
      <div class="form-group">
        <label class="control-label">仓库</label>
        <div class="repo-wrapper" id="wrapRepo">
          <div class="input-group">
            <span class="input-group-addon"><i class="fa fa-book"></i></span>
            <input type="text" class="form-control" id="inpRepo"
                   placeholder="owner/repo" autocomplete="off">
            <span class="input-group-btn">
              <button class="btn btn-default" id="btnClear"
                      style="display:none" title="清除">
                <i class="fa fa-times"></i>
              </button>
            </span>
          </div>
          <div class="repo-dropdown" id="ddRepo"></div>
        </div>
      </div>

      <hr class="soft">

      <!-- 文件上传 -->
      <div class="form-group">
        <label class="control-label">文件</label>
        <div class="dropzone" id="zone">
          <div class="dz-icon"><i class="fa fa-cloud-upload"></i></div>
          <div class="dz-main">拖拽文件到此处，或 <strong>点击选择</strong></div>
          <div class="dz-hint">支持任意文件类型</div>
        </div>
        <div class="file-info-card" id="card">
          <div class="fic-icon"><i class="fa fa-file-text"></i></div>
          <div class="fic-detail">
            <div class="fic-name" id="fname"></div>
            <div class="fic-size" id="fsize"></div>
          </div>
          <button class="fic-remove" id="btnDel" title="移除">
            <i class="fa fa-times-circle"></i>
          </button>
        </div>
        <input type="file" id="inpFile" hidden>
      </div>

      <hr class="soft">

      <!-- 路径 -->
      <div class="form-group">
        <label class="control-label">
          目标路径
          <span class="text-light"> 例如 docs/readme.md</span>
        </label>
        <div class="input-group">
          <span class="input-group-addon"><i class="fa fa-folder-open"></i></span>
          <input type="text" class="form-control" id="inpPath"
                 placeholder="path/to/file.txt">
        </div>
      </div>

      <!-- 提交信息 -->
      <div class="form-group">
        <label class="control-label">提交信息</label>
        <div class="input-group">
          <span class="input-group-addon"><i class="fa fa-comment"></i></span>
          <input type="text" class="form-control" id="inpMsg"
                 value="Upload via API" placeholder="commit message">
        </div>
      </div>

      <!-- 上传按钮 -->
      <button class="btn btn-primary btn-upload" id="btnUp" disabled>
        <span id="btnLabel">上传到 GitHub</span>
        <i class="fa fa-spinner fa-spin" id="btnSpinner"></i>
      </button>

      <div class="alert alert-msg" id="msg"></div>
    </div>
  </div>
</div>

<script src="https://apps.bdimg.com/libs/jquery/2.1.4/jquery.min.js"></script>
<script src="https://apps.bdimg.com/libs/bootstrap/3.3.4/js/bootstrap.min.js"></script>
<script>
  $(function () {
    var $repo = $('#inpRepo'),
        $dd   = $('#ddRepo'),
        $clear= $('#btnClear'),
        $wrap = $('#wrapRepo'),
        $path = $('#inpPath'),
        $msg  = $('#inpMsg'),
        $zone = $('#zone'),
        $card = $('#card'),
        $fname= $('#fname'),
        $fsize= $('#fsize'),
        $del  = $('#btnDel'),
        $file = $('#inpFile'),
        $btn  = $('#btnUp'),
        $label= $('#btnLabel'),
        $spin = $('#btnSpinner'),
        $alert= $('#msg');

    var _file = null, _repo = null, _timer = null, _di = -1;

    function fmtBytes(b) {
      if (b < 1024) return b + ' B';
      if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
      return (b / 1048576).toFixed(1) + ' MB';
    }

    function showAlert(msg, type) {
      $alert.removeClass('alert-success alert-danger alert-info')
            .addClass('alert-' + type).text(msg).show();
    }
    function hideAlert() { $alert.hide().text(''); }

    function checkBtn() {
      $btn.prop('disabled', !($repo.val().trim() && _file && $path.val().trim()));
    }

    // 搜索仓库
    function searchRepos(q) {
      return $.getJSON('/api/repos?q=' + encodeURIComponent(q))
        .then(function (d) { return d.repos || []; })
        .fail(function () { return []; });
    }

    function escapeHtml(s) {
      return $('<div>').text(s).html();
    }

    function renderDropdown(repos) {
      $dd.empty(); _di = -1;
      if (!repos.length) {
        $dd.append('<div class="repo-dd-item" style="color:#aaa;cursor:default">未找到仓库</div>').addClass('open');
        return;
      }
      repos.forEach(function (r, i) {
        var $item = $('<div class="repo-dd-item"></div>');
        var badge = r.private ? ' <span class="repo-private"><i class="fa fa-lock"></i></span>' : '';
        var desc  = r.description ? '<span class="repo-desc">' + escapeHtml(r.description) + '</span>' : '';
        $item.html('<span class="repo-fullname">' + escapeHtml(r.full_name) + '</span>' + badge + desc);
        $item.data('repo', r).data('idx', i);
        $item.on('mousedown', function (e) {
          e.preventDefault();
          pickRepo($(this).data('repo'));
        });
        $dd.append($item);
      });
      $dd.addClass('open');
    }

    function pickRepo(r) {
      _repo = r;
      $repo.val(r.full_name);
      $dd.removeClass('open');
      $clear.show();
      checkBtn();
    }

    // 仓库输入
    $repo.on('input', function () {
      var v = $.trim(this.value);
      $clear.toggle(v.length > 0);
      _repo = null;
      if (v.indexOf('/') > -1 && v.length > 2) {
        clearTimeout(_timer);
        _timer = setTimeout(function () {
          searchRepos(v).then(renderDropdown);
        }, 350);
      } else if (!v) {
        clearTimeout(_timer);
        _timer = setTimeout(function () {
          searchRepos('').then(function (r) { if (r.length) renderDropdown(r); });
        }, 300);
      } else {
        $dd.removeClass('open');
      }
      checkBtn();
    });

    $repo.on('focus', function () {
      if (!$.trim(this.value)) {
        searchRepos('').then(function (r) { if (r.length) renderDropdown(r); });
      }
    });

    // 键盘导航
    $repo.on('keydown', function (e) {
      var items = $dd.find('.repo-dd-item:not([style*="cursor:default"])');
      if (!$dd.hasClass('open') || !items.length) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        _di = Math.min(_di + 1, items.length - 1);
        items.removeClass('active').eq(_di).addClass('active').get(0).scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        _di = Math.max(_di - 1, 0);
        items.removeClass('active').eq(_di).addClass('active').get(0).scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'Enter' && _di >= 0) {
        e.preventDefault();
        items.eq(_di).trigger('mousedown');
      } else if (e.key === 'Escape') {
        $dd.removeClass('open');
      }
    });

    $(document).on('click', function (e) {
      if (!$.contains($wrap[0], e.target)) $dd.removeClass('open');
    });

    $clear.on('click', function () {
      $repo.val('').focus(); _repo = null;
      $dd.removeClass('open'); $(this).hide();
      checkBtn();
    });

    // 文件上传区域
    $zone.on('click', function () { $file.click(); });

    $file.on('change', function () {
      if (this.files.length) setFile(this.files[0]);
    });

    $zone.on('dragover', function (e) {
      e.preventDefault();
      $(this).addClass('drag-over');
    }).on('dragleave', function (e) {
      e.preventDefault();
      $(this).removeClass('drag-over');
    }).on('drop', function (e) {
      e.preventDefault();
      $(this).removeClass('drag-over');
      var files = e.originalEvent.dataTransfer.files;
      if (files.length) setFile(files[0]);
    });

    function setFile(f) {
      _file = f;
      $fname.text(f.name);
      $fsize.text(fmtBytes(f.size));
      $card.addClass('show');
      $zone.addClass('has-file');
      if (!$.trim($path.val())) $path.val(f.name);
      checkBtn();
    }

    $del.on('click', function (e) {
      e.stopPropagation();
      _file = null;
      $file.val('');
      $card.removeClass('show');
      $zone.removeClass('has-file');
      checkBtn();
    });

    $path.on('input', checkBtn);

    // 上传
    $btn.on('click', function () {
      if ($btn.prop('disabled') || !_file) return;

      hideAlert();
      $btn.prop('disabled', true);
      $label.text('上传中');
      $spin.show();

      var reader = new FileReader();
      reader.onload = function () {
        var b64 = reader.result.split(',')[1];
        $.ajax({
          url: '/api/upload',
          method: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({
            repo: $.trim($repo.val()),
            branch: 'main',
            path: $.trim($path.val()),
            content: b64,
            message: $.trim($msg.val()) || 'Upload via API'
          }),
          success: function (d) {
            var action = d.overwritten ? '已覆盖' : '已创建';
            var link = d.url ? ' — <a href="' + d.url + '" target="_blank">查看 <i class="fa fa-external-link"></i></a>' : '';
            showAlert('文件' + action + '：' + d.path + link, 'success');
          },
          error: function (xhr) {
            var err = '未知错误';
            try { err = JSON.parse(xhr.responseText).error || err; } catch (_) {}
            showAlert('上传失败：' + err, 'danger');
          },
          complete: function () {
            $btn.prop('disabled', false);
            $label.text('上传到 GitHub');
            $spin.hide();
            checkBtn();
          }
        });
      };
      reader.onerror = function () {
        showAlert('文件读取失败', 'danger');
        $btn.prop('disabled', false);
        $label.text('上传到 GitHub');
        $spin.hide();
        checkBtn();
      };
      reader.readAsDataURL(_file);
    });
  });
</script>

</body>
</html>
