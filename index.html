<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Upload</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: #fff;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .container { width: 100%; max-width: 520px; padding: 40px 24px; }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
    }
    .header h1 { font-size: 20px; font-weight: 500; letter-spacing: -0.3px; }
    .header svg { width: 20px; height: 20px; }

    .field { margin-bottom: 24px; }
    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .input {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }
    .input:focus { border-color: #1a1a1a; box-shadow: 0 0 0 3px rgba(0,0,0,0.04); }
    .input::placeholder { color: #ccc; }

    .input-wrap { position: relative; }
    .input-wrap .input { padding-right: 36px; }
    .input-clear {
      position: absolute;
      right: 10px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: #bbb; cursor: pointer;
      font-size: 16px; line-height: 1;
      padding: 4px;
      display: none;
    }
    .input-clear.on { display: block; }

    .dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      max-height: 220px;
      overflow-y: auto;
      z-index: 10;
      display: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
    .dropdown.on { display: block; }
    .dropdown-item {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
      border-bottom: 1px solid #f5f5f5;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:hover, .dropdown-item.sel { background: #f9f9f9; }
    .dropdown-item .dn { font-weight: 500; }
    .dropdown-item .dd { color: #aaa; font-size: 12px; margin-left: auto; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }

    .dropzone {
      border: 1.5px dashed #e5e5e5;
      border-radius: 8px;
      padding: 36px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #fafafa;
    }
    .dropzone:hover, .dropzone.over { border-color: #1a1a1a; background: #f5f5f5; }
    .dropzone.done { border-color: #1a1a1a; border-style: solid; background: #fafafa; }
    .dropzone svg { width: 32px; height: 32px; stroke: #bbb; margin-bottom: 10px; }
    .dropzone .dz-text { font-size: 13px; color: #999; }
    .dropzone .dz-text b { color: #555; font-weight: 500; }
    .dropzone .dz-hint { font-size: 11px; color: #ccc; margin-top: 4px; }

    .file-card {
      display: none;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      padding: 10px 14px;
      background: #fafafa;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
    }
    .file-card.on { display: flex; }
    .file-card .fc-name { flex: 1; font-size: 13px; word-break: break-all; }
    .file-card .fc-size { font-size: 12px; color: #aaa; white-space: nowrap; }
    .file-card .fc-del {
      background: none; border: none;
      color: #ccc; cursor: pointer;
      font-size: 16px; padding: 2px 4px;
      transition: color 0.15s;
    }
    .file-card .fc-del:hover { color: #e00; }

    .btn {
      width: 100%;
      height: 46px;
      background: #1a1a1a;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 32px;
      font-family: inherit;
      letter-spacing: 1px;
    }
    .btn:hover { background: #333; }
    .btn:disabled { background: #e5e5e5; color: #bbb; cursor: not-allowed; }
    .btn.busy { pointer-events: none; background: #555; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-left: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .msg {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
      line-height: 1.5;
    }
    .msg.on { display: block; }
    .msg.ok { background: #f0faf0; color: #2a7a2a; border: 1px solid #d4eed4; }
    .msg.err { background: #fef5f5; color: #c33; border: 1px solid #fdd; }
    .msg a { color: inherit; }

    .note {
      font-size: 11px;
      color: #ccc;
      margin-top: 4px;
    }

    @media (max-width: 480px) {
      .container { padding: 24px 16px; }
      .header { margin-bottom: 28px; }
      .dd { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <svg viewBox="0 0 16 16" fill="#1a1a1a"><path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      <h1>GitHub Upload</h1>
    </div>

    <!-- 仓库 -->
    <div class="field">
      <label class="field-label">仓库</label>
      <div class="input-wrap" id="wrapRepo">
        <input class="input" id="inpRepo" placeholder="owner/repo" autocomplete="off">
        <button class="input-clear" id="btnClear">&times;</button>
        <div class="dropdown" id="ddRepo"></div>
      </div>
    </div>

    <div class="field">
      <label class="field-label">路径<span class="note"> 如 folder/file.txt</span></label>
      <input class="input" id="inpPath" placeholder="path/to/file.txt">
    </div>

    <!-- 文件 -->
    <div class="field">
      <label class="field-label">文件</label>
      <div class="dropzone" id="zone">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <div class="dz-text">拖拽文件，或 <b>点击选择</b></div>
        <div class="dz-hint">已存在文件将直接覆盖</div>
      </div>
      <div class="file-card" id="card">
        <span>📄</span>
        <span class="fc-name" id="fname"></span>
        <span class="fc-size" id="fsize"></span>
        <button class="fc-del" id="btnDel">&times;</button>
      </div>
      <input type="file" id="inpFile" style="display:none">
    </div>

    <!-- 提交信息 -->
    <div class="field">
      <label class="field-label">提交信息</label>
      <input class="input" id="inpMsg" value="Upload via API" placeholder="commit message">
    </div>

    <button class="btn" id="btnUp" disabled>上传</button>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    (() => {
      const el = (id) => document.getElementById(id);
      const inpRepo = el('inpRepo'), ddRepo = el('ddRepo'), btnClear = el('btnClear'), wrapRepo = el('wrapRepo');
      const inpPath = el('inpPath'), inpMsg = el('inpMsg');
      const zone = el('zone'), card = el('card'), fname = el('fname'), fsize = el('fsize'), btnDel = el('btnDel'), inpFile = el('inpFile');
      const btnUp = el('btnUp'), msg = el('msg');

      let file = null, selRepo = null, timer = null, di = -1;

      const fmt = b => b < 1024 ? b + ' B' : b < 1048576 ? (b / 1024).toFixed(1) + ' KB' : (b / 1048576).toFixed(1) + ' MB';

      function showMsg(t, cls) { msg.textContent = t; msg.className = 'msg on ' + cls; }
      function hideMsg() { msg.className = 'msg'; msg.textContent = ''; }

      function check() {
        btnUp.disabled = !(inpRepo.value.trim() && file && inpPath.value.trim());
      }

      function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

      async function search(q) {
        try {
          const r = await fetch('/api/repos?q=' + encodeURIComponent(q));
          if (!r.ok) throw 0;
          return (await r.json()).repos || [];
        } catch (_) { return []; }
      }

      function render(repos) {
        ddRepo.innerHTML = ''; di = -1;
        if (!repos.length) { ddRepo.innerHTML = '<div class="dropdown-item" style="color:#aaa;cursor:default">无结果</div>'; ddRepo.classList.add('on'); return; }
        repos.forEach((r, i) => {
          const d = document.createElement('div');
          d.className = 'dropdown-item';
          d.innerHTML = `<span class="dn">${esc(r.full_name)}</span>${r.private ? ' 🔒' : ''}<span class="dd">${esc(r.description || '')}</span>`;
          d.addEventListener('mousedown', e => { e.preventDefault(); pick(r); });
          d.dataset.idx = i;
          ddRepo.appendChild(d);
        });
        ddRepo.classList.add('on');
      }

      function pick(r) {
        selRepo = r;
        inpRepo.value = r.full_name;
        ddRepo.classList.remove('on');
        btnClear.classList.add('on');
        check();
      }

      inpRepo.addEventListener('input', function () {
        const v = this.value.trim();
        btnClear.classList.toggle('on', v.length > 0);
        selRepo = null;
        if (v.includes('/') && v.length > 2) {
          clearTimeout(timer);
          timer = setTimeout(async () => render(await search(v)), 350);
        } else if (!v) {
          clearTimeout(timer);
          timer = setTimeout(async () => { const r = await search(''); if (r.length) render(r); }, 300);
        } else { ddRepo.classList.remove('on'); }
        check();
      });

      inpRepo.addEventListener('focus', () => {
        if (!inpRepo.value.trim()) search('').then(r => { if (r.length) render(r); });
      });

      inpRepo.addEventListener('keydown', function (e) {
        const items = ddRepo.querySelectorAll('.dropdown-item:not([style*="cursor:default"])');
        if (!ddRepo.classList.contains('on') || !items.length) return;
        if (e.key === 'ArrowDown') { e.preventDefault(); di = Math.min(di + 1, items.length - 1); items.forEach((it, i) => { it.classList.toggle('sel', i === di); if (i === di) it.scrollIntoView({ block: 'nearest' }); }); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); di = Math.max(di - 1, 0); items.forEach((it, i) => { it.classList.toggle('sel', i === di); if (i === di) it.scrollIntoView({ block: 'nearest' }); }); }
        else if (e.key === 'Enter' && di >= 0) { e.preventDefault(); items[di].click(); }
        else if (e.key === 'Escape') { ddRepo.classList.remove('on'); }
      });

      document.addEventListener('click', e => { if (!wrapRepo.contains(e.target)) ddRepo.classList.remove('on'); });

      btnClear.addEventListener('click', () => {
        inpRepo.value = ''; selRepo = null; ddRepo.classList.remove('on');
        btnClear.classList.remove('on'); check(); inpRepo.focus();
      });

      // 文件
      zone.addEventListener('click', () => inpFile.click());
      inpFile.addEventListener('change', () => { if (inpFile.files.length) setFile(inpFile.files[0]); });

      zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
      zone.addEventListener('dragleave', e => { e.preventDefault(); zone.classList.remove('over'); });
      zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('over'); if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]); });

      function setFile(f) {
        file = f; fname.textContent = f.name; fsize.textContent = fmt(f.size);
        card.classList.add('on'); zone.classList.add('done');
        if (!inpPath.value.trim()) inpPath.value = f.name;
        check();
      }

      btnDel.addEventListener('click', e => {
        e.stopPropagation(); file = null; inpFile.value = '';
        card.classList.remove('on'); zone.classList.remove('done'); check();
      });

      inpPath.addEventListener('input', check);

      // 上传
      btnUp.addEventListener('click', async function () {
        if (this.disabled || !file) return;
        hideMsg(); this.disabled = true; this.classList.add('busy');
        this.innerHTML = '上传中<span class="spinner"></span>';

        try {
          const b64 = await new Promise((ok, no) => { const r = new FileReader(); r.onload = () => ok(r.result.split(',')[1]); r.onerror = no; r.readAsDataURL(file); });
          const res = await fetch('/api/upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              repo: inpRepo.value.trim(),
              branch: 'main',
              path: inpPath.value.trim(),
              content: b64,
              message: inpMsg.value.trim() || 'Upload via API'
            })
          });
          const d = await res.json();
          if (res.ok) {
            const a = d.overwritten ? '已覆盖' : '已创建';
            showMsg(`文件${a}：${d.path}${d.url ? ` — <a href="${d.url}" target="_blank">查看 &nearr;</a>` : ''}`, 'ok');
          } else {
            showMsg('上传失败：' + (d.error || '未知错误'), 'err');
          }
        } catch (e) {
          showMsg('网络错误：' + e.message, 'err');
        } finally {
          this.disabled = false; this.classList.remove('busy');
          this.textContent = '上传'; check();
        }
      });
    })();
  </script>
</body>
</html>
